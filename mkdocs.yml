site_name: rsync4j
repo_url: https://github.com/fracpete/rsync4j
edit_uri: edit/master/docs/
site_description: rsync4j Documentation
theme:
    name: material
    features:
      - content.code.copy
markdown_extensions:
    - toc:
          baselevel: 2
          permalink: "#"
    - attr_list
    - sane_lists
    - pymdownx.highlight:
        anchor_linenums: true
        line_spans: __span
        pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
plugins:
    - search
nav:
    - Home: index.md
    - Command-line: commandline.md
    - Java: java.md
    - Windows: windows.md
    - Environment variables: env_vars.md
    - FAQ: faq.md
    - Maven: maven.md
    - Releases: releases.md

